# Monitor (auto-detect resolution and refresh rate)
monitor = , preferred, auto, 1

# Cursor
env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24
env = LC_TIME,en_GB.UTF-8

# Autostart
exec-once = hyprlock --grace 0
exec-once = hypridle
exec-once = hyprpanel
exec-once = swww-daemon
exec-once = wl-clip-persist --clipboard both
exec-once = wl-paste --watch cliphist store
exec-once = systemctl --user start hyprpolkitagent
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gnome-keyring-daemon --start --components=secrets,pkcs11
exec-once = ~/.config/hypr/scripts/hypr-brave-unfullscreen-fix
exec-once = hyprswitch init &
exec = ~/.local/bin/hypr-extras

# Input
input {
    kb_layout = us
    kb_variant = altgr-intl
    kb_options = caps:escape
    repeat_delay = 250
    repeat_rate = 45
    follow_mouse = 2
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}

device {
    name = elan0676:00-04f3:3195-touchpad
    sensitivity = 0.4
    accel_profile = flat
}

# General
general {
    layout = dwindle
    gaps_in = 3
    gaps_out = 4
    border_size = 2
    col.active_border = rgba(d4a0b9ee)
    col.inactive_border = rgba(313244aa)
}

# Dwindle (auto-tile BSP)
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

# Decoration
decoration {
    rounding = 4
    blur {
        enabled = true
        size = 5
        passes = 2
    }
    shadow {
        enabled = true
        range = 10
        render_power = 3
        color = rgba(1a1a2eee)
    }
}

# Animations
animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1
    animation = windows, 1, 4, ease
    animation = windowsOut, 1, 4, ease, popin 80%
    animation = fade, 1, 3, ease
    animation = workspaces, 1, 4, ease
}

# Misc
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
}

ecosystem {
    no_update_news = true
}

plugin {
    hyprexpo {
        dynamic_grid = 1
        gap_size = 8
        bg_col = rgb(1d2021)
        workspace_method = center current
        enable_gesture = false
        enable_keyboard_nav = 1
        active_highlight_col = 0xFFd4a0b9
        active_highlight_border = 2
    }
}

# Workaround: commit-timing-v1 (wayland-protocols 1.48) causes Brave to stop
# repainting when unfocused. Disable until upstream fix.
render {
    commit_timing_enabled = false
}

# Window rules - Steam
windowrule = float off, match:class steam
windowrule = fullscreen on, match:class steam_app_
windowrule = immediate on, match:class steam_app_

# Window rules - General
windowrule = float on, match:class pavucontrol
windowrule = float on, match:class blueman-manager
windowrule = float on, match:title Open File
windowrule = float on, match:title Save File
windowrule = float on, match:title Picture in picture
windowrule = pin on, match:title Picture in picture
windowrule = float on, match:class gsimplecal
windowrule = pin on, match:class gsimplecal
windowrule = move 1080 35, match:class gsimplecal

# Chat apps → workspace 1
windowrule = workspace 1 silent, match:class Slack
windowrule = workspace 1 silent, match:class signal
windowrule = workspace 1 silent, match:class com.rtosta.zapzap
windowrule = workspace 1 silent, match:class brave-akpamiohjfcnimfljfndmaldlcfphjmp-Default

# Pip terminal
windowrule = workspace special:pip, match:class pipterm
windowrule = float on, match:class pipterm

$mainMod = SUPER

# Apps
bindd = $mainMod, C, Open chat apps in 2x2, exec, ~/.config/hypr/scripts/hypr-chats
bindd = $mainMod, Return, Open terminal, exec, kitty
bindrd = $mainMod, SUPER_L, Open app launcher, exec, rofi -show drun
bindd = $mainMod, Q, Close active window, killactive
bindd = $mainMod, S, Open Spotify, exec, spotify-launcher
bindd = $mainMod, B, Open Brave, exec, brave
bindd = $mainMod, F, Toggle fullscreen, fullscreen
bindd = $mainMod, M, Toggle maximize, fullscreen, 1
bindd = $mainMod, T, Arrange 3 windows in columns, exec, ~/.config/hypr/scripts/hypr-3columns
bindd = $mainMod, BackSpace, Toggle pip terminal, exec, ~/.config/hypr/scripts/pipterm
bindd = $mainMod, E, Emoji picker, exec, rofimoji --selector rofi --action type
# Screenshots
bindd = , Print, Screenshot area, exec, ~/.config/hypr/scripts/hypr-screenshot area
bindd = SHIFT, Print, Screenshot active window, exec, ~/.config/hypr/scripts/hypr-screenshot window
bindd = CTRL, Print, Screenshot full screen, exec, ~/.config/hypr/scripts/hypr-screenshot full
bindd = $mainMod, Print, OCR area to clipboard, exec, ~/.config/hypr/scripts/hypr-screenshot ocr
bindd = $mainMod SHIFT, V, Clipboard history, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bindd = $mainMod, Escape, Lock screen, exec, loginctl lock-session
bindd = $mainMod SHIFT, Escape, Power menu, exec, ~/.config/hypr/scripts/hypr-wlogout
bindd = $mainMod SHIFT, B, Power profile picker, exec, ~/.config/hypr/scripts/hypr-power-profile
bindd = $mainMod SHIFT, P, Restart status bar, exec, sh -c "pkill -9 -f 'gjs.*-ags\\.js'; pkill -9 -x hyprpanel-app; sleep 1; hyprctl dispatch exec hyprpanel"

# Brightness (notebook)
binded = , XF86MonBrightnessUp, Brightness up, exec, brightnessctl set 5%+
binded = , XF86MonBrightnessDown, Brightness down, exec, brightnessctl set 5%-

# Volume keys
binded = , XF86AudioRaiseVolume, Volume up, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
binded = , XF86AudioLowerVolume, Volume down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindd = , XF86AudioMute, Toggle mute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindd = $mainMod, Left,  Spotify previous, exec, playerctl -p spotify previous
bindd = $mainMod, Down,  Spotify play/pause, exec, playerctl -p spotify play-pause
bindd = $mainMod, Right, Spotify next, exec, playerctl -p spotify next

# Focus between windows (same workspace)
bindd = $mainMod, h, Focus left, exec, ~/.config/hypr/scripts/hypr-smartfocus l
bindd = $mainMod, j, Focus down, exec, ~/.config/hypr/scripts/hypr-smartfocus d
bindd = $mainMod, k, Focus up, exec, ~/.config/hypr/scripts/hypr-smartfocus u
bindd = $mainMod, l, Focus right, exec, ~/.config/hypr/scripts/hypr-smartfocus r

# Switch desktop (horizontal)
bindd = $mainMod CTRL, h, Previous workspace, exec, ~/.config/hypr/scripts/hypr-switchws -1
bindd = $mainMod CTRL, l, Next workspace, exec, ~/.config/hypr/scripts/hypr-switchws +1
bindd = $mainMod, 1, Go to workspace 1, workspace, 1
bindd = $mainMod, 2, Go to workspace 2, workspace, 2
bindd = $mainMod, 3, Go to workspace 3, workspace, 3
bindd = $mainMod, 4, Go to workspace 4, workspace, 4
bindd = $mainMod, 5, Go to workspace 5, workspace, 5
bindd = $mainMod, mouse_down, Previous workspace (scroll), exec, ~/.config/hypr/scripts/hypr-switchws -1
bindd = $mainMod, mouse_up, Next workspace (scroll), exec, ~/.config/hypr/scripts/hypr-switchws +1
bindd = $mainMod CTRL, Tab, Next workspace, exec, ~/.config/hypr/scripts/hypr-switchws +1
bindd = $mainMod CTRL SHIFT, Tab, Previous workspace, exec, ~/.config/hypr/scripts/hypr-switchws -1
bindd = $mainMod SHIFT, mouse_up, Move window to next workspace (scroll), exec, ~/.config/hypr/scripts/hypr-movewindow r
bindd = $mainMod SHIFT, mouse_down, Move window to previous workspace (scroll), exec, ~/.config/hypr/scripts/hypr-movewindow l

# Move window: swap within workspace, or to adjacent desktop at edge
bindd = $mainMod SHIFT, h, Move window left, exec, ~/.config/hypr/scripts/hypr-movewindow l
bindd = $mainMod SHIFT, j, Move window down, exec, ~/.config/hypr/scripts/hypr-movewindow d
bindd = $mainMod SHIFT, k, Move window up, exec, ~/.config/hypr/scripts/hypr-movewindow u
bindd = $mainMod SHIFT, l, Move window right, exec, ~/.config/hypr/scripts/hypr-movewindow r

# Window switcher
bindd = ALT, Tab, Window switcher (cycle), exec, hyprswitch gui --mod-key alt --key tab --close mod-key-release --sort-recent
bindd = ALT SHIFT, Tab, Window switcher (cycle reverse), exec, hyprswitch gui --mod-key alt --key tab --reverse-key=mod=shift --close mod-key-release --sort-recent
bindd = $mainMod, Tab, Window finder (search by name), exec, rofi -show window
bindd = $mainMod, slash, Show all keybinds, exec, ~/.config/hypr/scripts/hypr-keybinds
bindd = $mainMod, grave, Workspace overview, hyprexpo:expo, toggle

# Monitor navigation
bindd = $mainMod ALT, h, Focus monitor left, focusmonitor, l
bindd = $mainMod ALT, j, Focus monitor down, focusmonitor, d
bindd = $mainMod ALT, k, Focus monitor up, focusmonitor, u
bindd = $mainMod ALT, l, Focus monitor right, focusmonitor, r
bindd = $mainMod ALT SHIFT, h, Move window to left monitor, movewindow, mon:l
bindd = $mainMod ALT SHIFT, j, Move window to down monitor, movewindow, mon:d
bindd = $mainMod ALT SHIFT, k, Move window to up monitor, movewindow, mon:u
bindd = $mainMod ALT SHIFT, l, Move window to right monitor, movewindow, mon:r

# Resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
