# Monitor (auto-detect resolution and refresh rate)
monitor = , preferred, auto, 1

# Cursor
env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24
env = LC_TIME,en_GB.UTF-8

# Autostart
exec-once = hyprlock --immediate
exec-once = hyprpanel
exec-once = swww-daemon
exec-once = wl-clip-persist --clipboard both
exec-once = wl-paste --watch cliphist store
exec-once = systemctl --user start hyprpolkitagent
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gnome-keyring-daemon --start --components=secrets,pkcs11

# Input
input {
    kb_layout = us
    kb_variant = altgr-intl
    kb_options = caps:escape
    repeat_delay = 250
    repeat_rate = 45
    follow_mouse = 2
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}

# General
general {
    layout = dwindle
    gaps_in = 3
    gaps_out = 4
    border_size = 2
    col.active_border = rgba(d4a0b9ee)
    col.inactive_border = rgba(313244aa)
}

# Dwindle (auto-tile BSP)
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

# Decoration
decoration {
    rounding = 4
    blur {
        enabled = true
        size = 5
        passes = 2
    }
    shadow {
        enabled = true
        range = 10
        render_power = 3
        color = rgba(1a1a2eee)
    }
}

# Animations
animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1
    animation = windows, 1, 4, ease
    animation = windowsOut, 1, 4, ease, popin 80%
    animation = fade, 1, 3, ease
    animation = workspaces, 1, 4, ease
}

# Misc
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

ecosystem {
    no_update_news = true
}

# Window rules - Steam
windowrule = float off, match:class steam
windowrule = fullscreen on, match:class steam_app_
windowrule = immediate on, match:class steam_app_

# Window rules - General
windowrule = float on, match:class pavucontrol
windowrule = float on, match:class blueman-manager
windowrule = float on, match:title Open File
windowrule = float on, match:title Save File
windowrule = float on, match:title Picture in picture
windowrule = pin on, match:title Picture in picture
windowrule = float on, match:class gsimplecal
windowrule = pin on, match:class gsimplecal
windowrule = move 1080 35, match:class gsimplecal

$mainMod = SUPER

# Apps
bind = $mainMod, Return, exec, kitty
bindr = $mainMod, SUPER_L, exec, rofi -show drun
bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen
bind = $mainMod, M, fullscreen, 1
# Screenshots
bind = , Print, exec, mkdir -p ~/Pictures/Screenshots && grim -g "$(slurp)" - | tee ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png | wl-copy
bind = $mainMod, Print, exec, mkdir -p ~/Pictures/Screenshots && hyprctl -j activewindow | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"' | grim -g - - | tee ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png | wl-copy
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod, Escape, exec, hyprlock

# Brightness (notebook)
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Volume keys
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Focus between windows (same workspace)
bind = $mainMod, h, exec, ~/.config/hypr/scripts/hypr-smartfocus l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, exec, ~/.config/hypr/scripts/hypr-smartfocus r

# Switch desktop (horizontal)
bind = $mainMod CTRL, h, workspace, -1
bind = $mainMod CTRL, l, workspace, +1
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move window: swap within workspace, or to adjacent desktop at edge
bind = $mainMod SHIFT, h, exec, ~/.config/hypr/scripts/hypr-movewindow l
bind = $mainMod SHIFT, j, exec, ~/.config/hypr/scripts/hypr-movewindow d
bind = $mainMod SHIFT, k, exec, ~/.config/hypr/scripts/hypr-movewindow u
bind = $mainMod SHIFT, l, exec, ~/.config/hypr/scripts/hypr-movewindow r

# Resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
