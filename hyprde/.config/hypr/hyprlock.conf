
background {
    color = rgb(1d2021)
}

input-field {
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    outer_color = rgb(d4a0b9)
    inner_color = rgb(282828)
    font_color = rgb(ebdbb2)
    fade_on_empty = false
    fade_timeout = 0
    placeholder_text = Password
    fail_color = rgb(cc241d)
    fail_text = $FAIL
    capslock_color = rgb(d79921)
    position = 0, 0
    halign = center
    valign = center
}

label {
    text = $TIME
    color = rgb(ebdbb2)
    font_size = 48
    font_family = MesloLGS Nerd Font
    position = 0, 120
    halign = center
    valign = center
}
