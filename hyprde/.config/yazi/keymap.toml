[[mgr.prepend_keymap]]
on   = "W"
run  = '''shell -- bash -c '
    IMAGE="$(realpath "%h")"
    cp "$IMAGE" ~/.config/background
    swww img "$IMAGE" --transition-type fade --transition-duration 1
    notify-send "Wallpaper changed" "$(basename "$IMAGE")"
' '''
desc = "Set image as wallpaper"

[[mgr.prepend_keymap]]
on   = "f"
run  = "plugin jump-to-char"
desc = "Jump to char"

[[mgr.prepend_keymap]]
on   = "F"
run  = "plugin smart-filter"
desc = "Smart filter"

[[mgr.prepend_keymap]]
on   = ["c", "m"]
run  = "plugin chmod"
desc = "Chmod"
